[logger]
level = "info"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[runner]
fastReruns = false
magicEnabled = true

[server]
headless = false
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[theme]
primaryColor = "#FF6B6B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"
